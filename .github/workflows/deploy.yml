name: Deploy to production

# Publishes the production build to GitHub Pages and deploys the Firestore
# Rules and indexes. Runs only for the trusted `main` branch so the deploy
# service-account secret is never exposed to pull requests from forks.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow one concurrent production deploy; a newer push supersedes an
# in-progress run rather than queueing behind it.
concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}
    env:
      # Public Firebase Web App configuration, injected into the bundle at
      # build time by Vite. Stored as repository Actions *variables*.
      VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Static checks + production build with the Pages base path. Tests are
      # intentionally excluded here for a faster deploy; they run on the
      # pre-commit hook instead (see .husky/pre-commit).
      - name: Verify and build
        run: npm run verify:ci

      # Deploy Rules and indexes before publishing the frontend: if this step
      # fails, the Pages artifact is never uploaded (see docs/08-deployment.md).
      - name: Deploy Firestore Rules and indexes
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/service-account.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/service-account.json"
          npx firebase deploy \
            --only firestore:rules,firestore:indexes \
            --project "$VITE_FIREBASE_PROJECT_ID" \
            --non-interactive
          rm -f "$RUNNER_TEMP/service-account.json"

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
