  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ine;gap:14px;margin-bottom:8px;\"><span style=\"font:800 13px Nunito;letter-spacing:1.6px;text-transform:uppercase;color:#E36397;\">07 / Handoff<\u002Fspan><\u002Fdiv>\n  <h2 style=\"font:800 28px Nunito;color:#3A2E34;margin:0 0 4px;\">Drop into <code style=\"font:800 22px ui-monospace,monospace;color:#B8446F;\">src/app/theme.ts<\u002Fcode><\u002Fh2>\n  <p style=\"font:400 15px/1.5 'Nunito Sans';color:#7A6B72;margin:0 0 24px;max-width:680px;\">Every token above maps to a MUI v5/v6 <code style=\"font:600 12.5px ui-monospace,monospace;background:#FFE7F0;color:#B8446F;padding:1px 5px;border-radius:5px;\">createTheme()<\u002Fcode> config with <code style=\"font:600 12.5px ui-monospace,monospace;background:#FFE7F0;color:#B8446F;padding:1px 5px;border-radius:5px;\">cssVariables:true<\u002Fcode> and both color schemes.<\u002Fp>\n  <div style=\"background:#241C21;border-radius:20px;padding:24px 26px;overflow:auto;box-shadow:0 12px 40px rgba(58,30,42,0.28);\">\n<pre style=\"margin:0;font:500 12.5px/1.7 ui-monospace,'SF Mono',Menlo,monospace;color:#E7D6DE;white-space:pre;\">import { createTheme } from '@mui/material/styles';\n\nexport const theme = createTheme({\n  cssVariables: { colorSchemeSelector: 'class' },\n  colorSchemes: {\n    <span style=\"color:#F49CBF;\">light<\u002Fspan>: { palette: {\n      primary:   { main: '#E36397', light: '#FBD5E5', dark: '#B8446F', contrastText: '#FFFFFF' },\n      secondary: { main: '#9B8CDB', light: '#E1DBF7', dark: '#6F5FB3', contrastText: '#FFFFFF' },\n      success:   { main: '#3FB98C', light: '#CDEFE0', contrastText: '#FFFFFF' }, <span style=\"color:#8FB8A5;\">// Ready now<\u002Fspan>\n      warning:   { main: '#E0A93B', light: '#FBEEC8', contrastText: '#3A2E34' }, <span style=\"color:#8FB8A5;\">// Can be cooked / expiring<\u002Fspan>\n      error:     { main: '#E45D5D', light: '#F9D2D2', contrastText: '#FFFFFF' }, <span style=\"color:#8FB8A5;\">// destructive / expired<\u002Fspan>\n      info:      { main: '#5AA9E6', light: '#D2E9F9', contrastText: '#FFFFFF' },\n      background:{ default: '#FDF2F6', paper: '#FFFFFF' },\n      text:      { primary: '#3A2E34', secondary: '#7A6B72', disabled: '#B7A9AF' },\n      divider:   '#F3DDE5',\n      action:    { hover: '#FFF1F6', selected: '#FBD5E5' },\n    }},\n    <span style=\"color:#F49CBF;\">dark<\u002Fspan>: { palette: {\n      primary:   { main: '#F49CBF', light: '#FBD5E5', dark: '#C86D91', contrastText: '#3A1E2A' },\n      secondary: { main: '#B7A9EC', contrastText: '#241E33' },\n      success:   { main: '#6FD0A6' }, warning: { main: '#EFC46A' },\n      error:     { main: '#F08A8A' }, info: { main: '#86C4F0' },\n      background:{ default: '#1E1A1D', paper: '#2A2329' },\n      text:      { primary: '#F6E9EF', secondary: '#C6B2BC', disabled: '#7C6C74' },\n      divider:   'rgba(255,255,255,0.09)',\n    }},\n  },\n\n  shape: { borderRadius: <span style=\"color:#F0B87A;\">14<\u002Fspan> },              <span style=\"color:#8FB8A5;\">// input 10 · button 14 · card 20 · sheet 24 · chip 999<\u002Fspan>\n  spacing: <span style=\"color:#F0B87A;\">8<\u002Fspan>,                          <span style=\"color:#8FB8A5;\">// 0.5/1/1.5/2/3/4 → 4 8 12 16 24 32<\u002Fspan>\n\n  typography: {\n    fontFamily: '\"Nunito Sans\", system-ui, sans-serif',\n    h1: { fontFamily: 'Nunito', fontWeight: 900, fontSize: '2rem',    lineHeight: 1.1 },\n    h2: { fontFamily: 'Nunito', fontWeight: 800, fontSize: '1.5rem',  lineHeight: 1.15 },\n    h3: { fontFamily: 'Nunito', fontWeight: 800, fontSize: '1.25rem' },\n    h5: { fontFamily: 'Nunito', fontWeight: 700, fontSize: '1rem' },\n    subtitle1: { fontWeight: 600, fontSize: '0.9375rem' },\n    body1: { fontSize: '0.9375rem', lineHeight: 1.5 },\n    body2: { fontSize: '0.8125rem', lineHeight: 1.55 },\n    button: { fontFamily: 'Nunito', fontWeight: 700, textTransform: 'none' },\n    overline: { fontWeight: 700, letterSpacing: '0.1em' },\n  },\n\n  components: {\n    MuiButton: { defaultProps: { disableElevation: true },\n      styleOverrides: { root: { borderRadius: 14, paddingInline: 20 },\n        contained: { boxShadow: '0 4px 12px rgba(227,99,151,0.30)' } } },\n    MuiCard:   { styleOverrides: { root: { borderRadius: 20,\n        border: '1px solid #F3DDE5', boxShadow: '0 2px 12px rgba(184,68,111,0.08)' } } },\n    MuiChip:   { styleOverrides: { root: { borderRadius: 999, fontWeight: 700 } } },\n    MuiDialog: { styleOverrides: { paper: { borderRadius: 24,\n        boxShadow: '0 16px 44px rgba(58,30,42,0.30)' } } },\n    MuiPaper:  { styleOverrides: { root: { backgroundImage: 'none' } } },\n    MuiBottomNavigation: { styleOverrides: { root: { borderTop: '1px solid #F3DDE5' } } },\n  },\n});<\u002Fpre>\n  <\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;margin-top:22px;\">\n    <div style=\"background:#fff;border:1px solid #F3DDE5;border-radius:16px;padding:16px 18px;box-shadow:0 2px 10px rgba(184,68,111,0.06);\"><h4 style=\"font:800 14px Nunito;color:#B8446F;margin:0 0 6px;\">StatusChip mapping<\u002Fh4><p style=\"font:400 12.5px/1.6 'Nunito Sans';color:#7A6B72;margin:0;\">Ready now → <b>success<\u002Fb> · Can be cooked → <b>warning<\u002Fb> · Unavailable → <b>default/grey<\u002Fb> · Not configured → <b>secondary<\u002Fb>. Build as a <code style=\"font:600 11.5px ui-monospace,monospace;color:#B8446F;\">&lt;Chip color size=\"small\"&gt;<\u002Fcode> with a leading dot via <code style=\"font:600 11.5px ui-monospace,monospace;color:#B8446F;\">icon<\u002Fcode>.<\u002Fp><\u002Fdiv>\n    <div style=\"background:#fff;border:1px solid #F3DDE5;border-radius:16px;padding:16px 18px;box-shadow:0 2px 10px rgba(184,68,111,0.06);\"><h4 style=\"font:800 14px Nunito;color:#B8446F;margin:0 0 6px;\">Illustrations<\u002Fh4><p style=\"font:400 12.5px/1.6 'Nunito Sans';color:#7A6B72;margin:0;\">Ship Kotyk as one <code style=\"font:600 11.5px ui-monospace,monospace;color:#B8446F;\">&lt;CatArt variant size /&gt;<\u002Fcode> SVG component. Flat pastels + <code style=\"font:600 11.5px ui-monospace,monospace;color:#B8446F;\">currentColor<\u002Fcode> motifs work in both schemes — no gradients to break.<\u002Fp><\u002Fdiv>\n    <div style=\"background:#fff;border:1px solid #F3DDE5;border-radius:16px;padding:16px 18px;box-shadow:0 2px 10px rgba(184,68,111,0.06);\"><h4 style=\"font:800 14px Nunito;color:#B8446F;margin:0 0 6px;\">Fonts &amp; i18n<\u002Fh4><p style=\"font:400 12.5px/1.6 'Nunito Sans';color:#7A6B72;margin:0;\">Nunito + Nunito Sans both carry Cyrillic — load latin + cyrillic subsets. No copy is baked into art, so <code style=\"font:600 11.5px ui-monospace,monospace;color:#B8446F;\">i18next<\u002Fcode> (UA default, EN fallback) drives all strings.<\u002Fp><\u002Fdiv>\n    <div style=\"background:#fff;border:1px solid #F3DDE5;border-radius:16px;padding:16px 18px;box-shadow:0 2px 10px rgba(184,68,111,0.06);\"><h4 style=\"font:800 14px Nunito;color:#B8446F;margin:0 0 6px;\">Responsive<\u002Fh4><p style=\"font:400 12.5px/1.6 'Nunito Sans';color:#7A6B72;margin:0;\">Mobile-first: BottomNavigation ≤ <code style=\"font:600 11.5px ui-monospace,monospace;color:#B8446F;\">md<\u002Fcode>; a persistent Drawer + multi-column grids at <code style=\"font:600 11.5px ui-monospace,monospace;color:#B8446F;\">md+<\u002Fcode>. Dialogs become centered modals; the Kanban gains full columns.<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
