<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:220,&quot;height&quot;:200},&quot;variant&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;idle&quot;,&quot;empty&quot;,&quot;sleep&quot;,&quot;confused&quot;,&quot;paw&quot;,&quot;whisker&quot;,&quot;logo&quot;],&quot;default&quot;:&quot;idle&quot;,&quot;tsType&quot;:&quot;'idle'|'empty'|'sleep'|'confused'|'paw'|'whisker'|'logo'&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const v = this.props.variant || 'idle';
    return {
      isIdle: v === 'idle',
      isEmpty: v === 'empty',
      isSleep: v === 'sleep',
      isConfused: v === 'confused',
      isPaw: v === 'paw',
      isWhisker: v === 'whisker',
      isLogo: v === 'logo',
    };
  }
}
</script>
